name: Trivy Docker Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  trivy-image:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ktor-app:latest .

      # 3. Cache Trivy DB (faster scans)
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}
          restore-keys: |
            trivy-${{ runner.os }}

      # 4. Run Trivy scan (fail on HIGH/CRITICAL)
      - name: Run Trivy (table output)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ktor-app:latest
          format: table
          severity: HIGH,CRITICAL,LOW,MEDIUM
          ignore-unfixed: true
          exit-code: 1

      # 5. Generate SARIF report
      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ktor-app:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL,LOW,MEDIUM
          ignore-unfixed: true

      # 6. Upload to GitHub Security tab
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
