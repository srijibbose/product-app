name: Trivy Docker Scan

on:
  pull_request:
    branches: [ main, develop,testworkflow,master ]
  push:
    branches: [ main,testworkflow,master ]

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  trivy-image:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup JDK (needed for Gradle build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Build JAR (IMPORTANT)
      - name: Build application
        run: ./gradlew build -x test

      # 2. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ktor-app:latest .

      # 4. Run Trivy scan (fail on HIGH/CRITICAL)
      - name: Run Trivy (table output)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ktor-app:latest
          format: table
          severity: HIGH,CRITICAL,LOW,MEDIUM
          ignore-unfixed: true
          exit-code: 0

      # 5. Generate SARIF report
      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ktor-app:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL,LOW,MEDIUM
          ignore-unfixed: true

      # 6. Upload to GitHub Security tab
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
