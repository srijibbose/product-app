name: Trivy Security Scan

on:
  pull_request:
    branches: [ main, develop, master ]
  push:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Run Trivy Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cache Trivy DB (makes scans much faster)
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/pom.xml') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      # 3. Run Trivy (table output for logs)
      - name: Run Trivy scan (console)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL,MEDIUM,LOW
          ignore-unfixed: true
          exit-code: 1

      # 4. Run Trivy again for SARIF (GitHub Security tab)
      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL,MEDIUM,LOW
          ignore-unfixed: true

      # 5. Upload results to GitHub Security tab
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
