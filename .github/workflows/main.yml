name: Trivy Scan

on:
  pull_request:
    branches:
      - main
      - develop
      - master

jobs:
  trivy:
    name: Run Trivy Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM,LOW
